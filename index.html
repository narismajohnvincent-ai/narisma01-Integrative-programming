<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE WORLD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Times New Roman", serif;
        }

        body {
            background-color: #000;
            color: #fb4b05;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .verse {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 50px;
        }

        .btn {
            display: inline-block;
            padding: 14px 40px;
            font-size: 1.1rem;
            color: #7CFF00;
            text-decoration: none;
            border: 2px solid #7CFF00;
            border-radius: 14px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #7CFF00;
            color: #000;
            box-shadow: 0 0 15px #7CFF00;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The World</h1>

        <p class="verse">
             "It is I who made the earth and created mankind on it. My own hands stretched out the heavens; I marshaled their starry hosts" 
        </p>

        <a href="#" class="btn">Open</a>
    </div>

</body>
</html>
